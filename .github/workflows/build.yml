name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python Package Tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer Cython==0.29.33 setuptools

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          # 1. 如果仓库里有旧的 spec，先删除，防止重复配置导致 DuplicateOptionError
          if [ -f buildozer.spec ]; then
            rm buildozer.spec
          fi
          
          # 2. 生成全新的干净 spec 文件
          buildozer init
          
          # 3. 精准修改 spec 中的核心配置（使用 sed，确保不重复且格式正确）
          # [Requirements] 增加 asyncio
          sed -i 's/^requirements = .*$/requirements = python3,kivy==2.3.0,bleak,asyncio/' buildozer.spec
          # [Permissions] 严格逗号分隔，无空格
          sed -i 's/^# android.permissions = .*$/android.permissions = BLUETOOTH,BLUETOOTH_ADMIN,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,BLUETOOTH_SCAN,BLUETOOTH_CONNECT,INTERNET/' buildozer.spec
          # [API & NDK] 设置稳定版本
          sed -i 's/^# android.api = .*$/android.api = 31/' buildozer.spec
          sed -i 's/^# android.minapi = .*$/android.minapi = 21/' buildozer.spec
          sed -i 's/^# android.ndk_api = .*$/android.ndk_api = 21/' buildozer.spec
          # [Archs] 只编译 arm64-v8a 提高成功率
          sed -i 's/^# android.archs = .*$/android.archs = arm64-v8a/' buildozer.spec
          
          # 4. 开始打包。yes 命令自动同意所有 Android 许可协议
          yes | buildozer -v android debug
          
      - name: Upload APK Artifact
        if: always() # 即使 Buildozer 失败也尝试上传已生成的日志或文件
        uses: actions/upload-artifact@v4
        with:
          name: dishwasher-apk
          path: bin/*.apk
