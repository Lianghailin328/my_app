name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # 修正：固定在更稳定的 22.04 版本

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          sudo apt update
          # 安装编译 Android 所需的基础库
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python Package Tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer Cython==0.29.33 setuptools

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 如果仓库没有 spec，就初始化并修改权限配置
          if [ ! -f buildozer.spec ]; then
            buildozer init
            sed -i 's/^requirements = .*$/requirements = python3,kivy,bleak/' buildozer.spec
            sed -i 's/^#android.permissions = .*$/android.permissions = BLUETOOTH, BLUETOOTH_ADMIN, ACCESS_FINE_LOCATION, BLUETOOTH_SCAN, BLUETOOTH_CONNECT, INTERNET/' buildozer.spec
            sed -i 's/^#android.api = .*$/android.api = 31/' buildozer.spec
          fi
          # 运行打包（自动同意许可证）
          yes | buildozer -v android debug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dishwasher-apk
          path: bin/*.apk
