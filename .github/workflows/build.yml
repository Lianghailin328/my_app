name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python Package Tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer Cython==0.29.33 setuptools

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          if [ -f buildozer.spec ]; then
            rm buildozer.spec
          fi
          
          buildozer init
          
          # 【关键修正】：确保包含了 pyjnius 和 android 核心依赖
          sed -i 's/^requirements = .*$/requirements = python3,kivy==2.3.0,bleak,pyjnius,android,asyncio/' buildozer.spec
          
          # 权限申请：严格逗号分隔
          sed -i 's/^# android.permissions = .*$/android.permissions = BLUETOOTH,BLUETOOTH_ADMIN,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,BLUETOOTH_SCAN,BLUETOOTH_CONNECT,INTERNET/' buildozer.spec
          
          # 设置稳定的 API 和 架构
          sed -i 's/^# android.api = .*$/android.api = 31/' buildozer.spec
          sed -i 's/^# android.minapi = .*$/android.minapi = 21/' buildozer.spec
          sed -i 's/^# android.ndk_api = .*$/android.ndk_api = 21/' buildozer.spec
          sed -i 's/^# android.archs = .*$/android.archs = arm64-v8a/' buildozer.spec
          
          # 开始打包
          yes | buildozer -v android debug
          
      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dishwasher-apk
          path: bin/*.apk
